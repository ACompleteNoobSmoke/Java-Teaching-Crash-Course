name: Build Workflow

run-name: 'Build Workflow -- ${{ github.head_ref || github.ref_name }}'

on:
  push:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"

      - name: Build
        run:  mvn clean install

      - name: Upload Coverage
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml

      - name: Enforce coverage threshold and add PR comment
        uses: madrapps/jacoco-report@v1.7.2 # Example action, others available
        with:
          paths: |
            ${{ github.workspace }}/**/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 100 # Set your desired minimum coverage %
          min-coverage-changed-files: 100 # Optional: Higher threshold for new code

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml # Adjust path as necessary
          flags: unittests





