name: Build Workflow

run-name: Build Workflow -- ${{ github.head_ref || github.ref_name }}

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"
          cache: maven

      - name: Build
        run: mvn -B clean verify

      - name: Show JaCoCo output
        run: |
          ls -R target || true
          test -f target/site/jacoco/jacoco.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: error

      - name: Enforce coverage threshold and add PR comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 100
          min-coverage-changed-files: 100

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true